<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} - {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/post.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/nav.css' | relative_url }}">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/elevatezoom/3.0.8/jquery.elevateZoom.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="/assets/js/scripts.js"></script>
</head>
</head>
<body>
   <!-- Header Section -->
  <div class="header-box">
    <header>
      <h1> {{ site.title }}</h1>
      <p>{{ site.description }}</p>
    </header>
  </div>
  <div class="main-container">

    <!-- Side Navigation -->
    <nav class="side-nav">
      <div class="nav-image">
        <img src="/assets/images/hacke-pic.jpg" alt="Profile Image" />
        <div class="image-indicator"></div>
      </div>
      <ul>
        <li><a href="#">Arth Doshi</a></li>
        <li><a href="https://github.com/Arth2001" target="_blank"><img src="/assets/images/github.png" alt="GitHub"> GitHub</a></li>
        <li><a href="mailto:arthdoshi05@gmail.com"><img src="/assets/images/email.png" alt="Email"> Email</a></li>
        <li><a href="https://www.linkedin.com/in/arthdoshi" target="_blank"><img src="/assets/images/linkedin.png" alt="LinkedIn"> LinkedIn</a></li>
       
      </ul>
    </nav>
  
    <!-- Blog Post -->
    <div class="post-box">
      <article class="post-content">
        <h1>{{ page.title }}</h1>
        <p class="post-meta">
          <span><strong>Date:</strong> {{ page.date | date: "%B %d, %Y" }}</span>
          {% if page.author %}
            <span><strong>Author:</strong> {{ page.author }}</span>
          {% endif %}
        </p>
        <div class="content">
          {{ content }}
        </div>
      </article>
    </div>
  </div>

    <article class="post-content">

        {% if page.author %}
          <span><strong>Author:</strong> {{ page.author }}</span>
        {% endif %}
      </p>
      <div class="content">
        {{ content }}
      </div>
    </article>
  </div> -->

  <div class="footer-box">
    <footer>
      <p>&copy; {{ site.time | date: "%Y" }} {{ site.title }}. All rights reserved.</p>
    </footer>
  </div>
</body>
